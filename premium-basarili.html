<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mmgcreativity — Ödeme Başarılı</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{ --bg:#0D1420; --surface:#141C2B; --hairline:#2A3448; --text:#EAEDF3; --muted:#8D96AC; --teal:#3FB68A; --brass:#C6A15B; }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{ background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
  .card{ background:var(--surface); border:1px solid var(--hairline); border-radius:16px; padding:40px 32px; max-width:420px; text-align:center; }
  .icon{ font-size:44px; margin-bottom:14px; }
  h1{ font-family:'Space Grotesk',sans-serif; font-size:22px; margin-bottom:10px; color:var(--teal); }
  p{ color:var(--muted); font-size:14px; line-height:1.6; margin-bottom:22px; }
  a{ display:inline-block; background:var(--brass); color:#0D1420; font-weight:700; padding:12px 22px; border-radius:9px; text-decoration:none; }
</style>
</head>
<body>
  <div class="card">
    <div class="icon">✅</div>
    <h1>Ödemeniz Alındı</h1>
    <p>Premium üyeliğiniz aktifleştirildi. Reklamsız deneyim, Excel/PDF dışa aktarma ve çoklu çekim gibi tüm premium özellikler artık hesabınızda açık.</p>
    <a href="index.html">Ana Sayfaya Dön</a>
  </div>
</body>
</html>
