<style>
  :root{
    --bg:#0D1420; --surface:#141C2B; --surface-2:#1B2536; --hairline:#2A3448;
    --text:#EAEDF3; --muted:#8D96AC; --brass:#C6A15B; --brass-dim:#8A7440;
    --red:#E2544B; --amber:#E3A23C; --teal:#3FB68A; --blue:#5B9BC4;
    --coral:#FF6B4A; --magenta:#D6407A; --violet:#7C4DD9; --azure:#3E8FE0;
    --grad:linear-gradient(120deg, var(--coral), var(--magenta) 45%, var(--violet) 75%, var(--azure));
    --sidebar-w:280px;
  }
  html.theme-light{
    --bg:#F4F5F7; --surface:#FFFFFF; --surface-2:#EEF0F3; --hairline:#DCE0E6;
    --text:#1B2230; --muted:#6B7383; --brass:#9A7B3F; --brass-dim:#B8A06C;
  }
  html.theme-light body{
    background:
      radial-gradient(1200px 600px at 85% -10%, rgba(198,161,91,0.05), transparent 60%),
      radial-gradient(900px 500px at -10% 20%, rgba(79,163,196,0.04), transparent 60%),
      var(--bg);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    background:
      radial-gradient(1200px 600px at 85% -10%, rgba(198,161,91,0.08), transparent 60%),
      radial-gradient(900px 500px at -10% 20%, rgba(79,163,196,0.06), transparent 60%),
      var(--bg);
    color:var(--text); font-family:'Inter',sans-serif; line-height:1.5;
    -webkit-font-smoothing:antialiased;
    display:flex; min-height:100vh; overflow:hidden;
  }
  .mono{font-family:'IBM Plex Mono',monospace;}

  /* ---------- Sidebar ---------- */
  aside{
    width:var(--sidebar-w); flex-shrink:0; height:100vh;
    background:var(--surface); border-right:1px solid var(--hairline);
    display:flex; flex-direction:column; overflow-y:auto;
    position:relative;
  }
  .brand{
    padding:36px 24px 36px; border-bottom:1px solid var(--hairline); position:relative; overflow:hidden;
    min-height:96px; display:flex; align-items:center; justify-content:center;
    flex-shrink:0;
    transition: min-height 0.2s ease;
  }
  .brand::before{
    content:''; position:absolute; top:-40px; left:-20px; width:160px; height:160px;
    background:radial-gradient(circle, rgba(255,107,74,0.16), rgba(124,77,217,0.10) 55%, transparent 75%);
    pointer-events:none;
  }
  .brand-row{
    display:flex; align-items:center; justify-content:center; gap:14px; margin-bottom:0; position:relative; width:100%;
  }
  .brand-row-logo{ height:112px; width:112px; border-radius:22px; object-fit:cover; display:inline-block; filter:drop-shadow(0 4px 14px rgba(0,0,0,0.35)); }
  .brand-row-fallback{
    display:none; width:112px; height:112px; border-radius:22px; margin:0;
    background:var(--grad); align-items:center; justify-content:center;
    font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:40px; color:#fff;
    box-shadow:0 4px 14px rgba(0,0,0,0.35);
  }
  .brand-title{
    font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:19px; letter-spacing:-0.01em;
    position:relative;
  }
  .brand-sub{
    font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--muted); margin-top:6px;
    text-align:center; position:relative;
  }

  nav{ padding:18px 12px; flex:1; }
  .nav-label{
    font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:.16em;
    color:var(--muted); text-transform:uppercase; padding:8px 12px 10px;
  }
  .nav-item{
    display:flex; align-items:center; gap:13px; width:100%; text-align:left;
    padding:11px 16px; border-radius:14px; border:1px solid transparent;
    background:transparent; color:var(--text); cursor:pointer; margin-bottom:3px;
    position:relative; transition:background .18s ease, border-color .18s ease, transform .18s ease, box-shadow .18s ease;
  }
  .nav-item:hover{ background:var(--surface-2); transform:translateX(2px); }
  .nav-item.active{
    background:linear-gradient(135deg, rgba(255,107,74,0.10), rgba(124,77,217,0.08));
    border-color:rgba(255,107,74,0.25);
    box-shadow:0 6px 18px rgba(0,0,0,0.28);
  }
  .nav-item.active::before{
    content:''; position:absolute; left:-12px; top:10px; bottom:10px; width:3px;
    background:var(--grad); border-radius:2px; box-shadow:0 0 10px rgba(214,64,122,0.5);
  }
  .nav-index{
    font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--brass-dim);
    width:20px; flex-shrink:0;
  }
  .nav-item.active .nav-index{ color:var(--brass); }
  .nav-icon-badge{
    width:20px; height:20px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
  }
  .nav-icon{ width:19px; height:19px; color:var(--muted); transition:color .15s ease; }
  .nav-item.active .nav-icon{ color:var(--coral); }
  .nav-text-wrap{ display:flex; flex-direction:row; align-items:baseline; gap:5px; min-width:0; flex-wrap:nowrap; overflow:hidden; }
  .nav-title{ font-size:13px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex-shrink:0; }
  .nav-desc{ font-size:13px; font-weight:700; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; min-width:0; }

  /* ---------- Main ---------- */
  main{ flex:1; height:100vh; display:flex; flex-direction:column; min-width:0; }
  .topbar{
    height:56px; flex-shrink:0; display:flex; align-items:center; justify-content:space-between;
    padding:0 26px; border-bottom:1px solid var(--hairline); background:rgba(20,28,43,0.5);
  }
  .topbar-title{ font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:15px; }
  .topbar-crumb{ font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--muted); }
  .topbar-actions a{
    font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--muted);
    text-decoration:none; border:1px solid var(--hairline); padding:6px 12px; border-radius:6px;
    transition:border-color .15s ease, color .15s ease;
  }
  .topbar-actions a:hover{ color:var(--coral); border-color:var(--coral); }
  .theme-toggle{
    display:flex; align-items:center; gap:7px;
    font-size:14px; background:transparent; border:1px solid var(--hairline); border-radius:6px;
    color:var(--muted); padding:6px 10px; cursor:pointer; transition:border-color .15s ease, color .15s ease;
    font-family:'IBM Plex Mono',monospace;
  }
  .theme-toggle:hover{ color:var(--brass); border-color:var(--brass-dim); }
  .theme-toggle-label{ font-size:11px; }
  .user-badge{
    display:flex; align-items:center; gap:7px; font-family:'IBM Plex Mono',monospace; font-size:11px;
    color:var(--text); padding:6px 12px; border:1px solid var(--hairline); border-radius:6px; background:var(--surface-2);
  }
  .user-badge-dot{ width:6px; height:6px; border-radius:50%; background:var(--teal); box-shadow:0 0 6px var(--teal); flex-shrink:0; }

  .top-right-badge{
    position:fixed; top:18px; right:22px; z-index:400;
    display:flex; align-items:center; gap:10px;
  }
  .theme-toggle-standalone{
    display:flex; align-items:center; gap:7px;
    font-size:14px; background:var(--surface); border:1px solid var(--hairline); border-radius:8px;
    color:var(--muted); padding:9px 13px; cursor:pointer; transition:border-color .15s ease, color .15s ease;
    font-family:'IBM Plex Mono',monospace; box-shadow:0 6px 16px rgba(0,0,0,0.3);
  }
  .theme-toggle-standalone:hover{ color:var(--brass); border-color:var(--brass-dim); }
  .account-trigger{
    display:flex; align-items:center; gap:10px; background:transparent; border:none;
    cursor:pointer; padding:0; font-family:inherit;
  }
  .top-right-badge .user-badge{
    box-shadow:0 6px 16px rgba(0,0,0,0.3);
  }
  .avatar-wrap{
    width:38px; height:38px; border-radius:50%; overflow:hidden;
    border:1px solid var(--hairline); background:var(--surface-2); flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 6px 16px rgba(0,0,0,0.3); transition:border-color .15s ease;
  }
  .account-trigger:hover .avatar-wrap{ border-color:var(--brass-dim); }
  .avatar-wrap img{ width:100%; height:100%; object-fit:cover; }
  .avatar-wrap svg{ width:20px; height:20px; color:var(--muted); }
  .avatar-wrap-lg{ width:52px; height:52px; }
  .avatar-wrap-lg svg{ width:26px; height:26px; }

  .account-dropdown{
    position:absolute; top:calc(100% + 12px); right:0; width:250px;
    background:var(--surface); border:1px solid var(--hairline); border-radius:14px;
    box-shadow:0 16px 40px rgba(0,0,0,0.45); padding:16px; z-index:401;
  }
  .account-dropdown[hidden]{ display:none; }
  .account-dropdown-header{ display:flex; align-items:center; gap:12px; margin-bottom:14px; }
  .account-dropdown-name{ font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:14px; color:var(--text); }
  .account-dropdown-sub{ font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--muted); margin-top:3px; }
  .account-dropdown-divider{ height:1px; background:var(--hairline); margin:0 -16px 8px; }
  .account-dropdown-item{
    display:flex; align-items:center; gap:10px; width:100%; text-align:left;
    background:transparent; border:none; border-radius:9px; padding:10px 8px; cursor:pointer;
    font-family:'Inter',sans-serif; font-size:13px; font-weight:600; color:var(--text);
    transition:background .15s ease;
  }
  .account-dropdown-item:hover{ background:var(--surface-2); }
  .account-dropdown-item svg{ width:17px; height:17px; color:var(--brass); flex-shrink:0; }
  .account-dropdown-item-danger:hover{ background:rgba(226,84,75,0.10); }
  .account-dropdown-item-danger svg{ color:var(--red); }
  .account-dropdown-item-danger span{ color:var(--red); }

  .account-info-overlay{
    position:fixed; inset:0; z-index:900; background:rgba(5,8,14,0.7);
    display:flex; align-items:center; justify-content:center; padding:24px;
  }
  .account-info-overlay[hidden]{ display:none; }
  .account-info-modal{
    width:100%; max-width:440px; max-height:88vh; overflow-y:auto;
    background:var(--surface); border:1px solid var(--hairline); border-radius:16px;
    padding:28px; box-shadow:0 24px 60px rgba(0,0,0,0.5);
  }
  .account-info-modal-header{ display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
  .account-info-modal-header h2{ font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:20px; }
  .account-info-close{
    background:transparent; border:1px solid var(--hairline); border-radius:7px; color:var(--muted);
    width:30px; height:30px; cursor:pointer; font-size:14px; transition:color .15s ease, border-color .15s ease;
  }
  .account-info-close:hover{ color:var(--coral); border-color:var(--coral); }
  .account-info-sub{ color:var(--muted); font-size:13px; margin-bottom:22px; }
  #accountInfoForm select, #accountInfoForm textarea{
    width:100%; background:var(--surface-2); border:1px solid var(--hairline); border-radius:8px;
    padding:12px 14px; color:var(--text); font-family:'Inter',sans-serif; font-size:14px; outline:none;
    transition:border-color .15s ease; resize:vertical;
  }
  #accountInfoForm select:focus, #accountInfoForm textarea:focus{ border-color:var(--brass-dim); }
  .account-info-saved{
    display:none; text-align:center; color:var(--teal); font-family:'IBM Plex Mono',monospace;
    font-size:12px; margin-top:10px;
  }
  .account-info-saved.show{ display:block; }

  .frame-wrap{ flex:1; position:relative; background:var(--bg); }
  iframe{ position:absolute; inset:0; width:100%; height:100%; border:0; }

  /* ---------- Home screen ---------- */
  .home{ flex:1; overflow-y:auto; }

  .hero{
    position:relative; overflow:hidden; padding:32px 48px 28px;
    background:
      radial-gradient(900px 460px at 78% -20%, rgba(255,107,74,0.16), transparent 60%),
      radial-gradient(700px 420px at 8% 110%, rgba(62,143,224,0.14), transparent 60%),
      var(--surface);
    border-bottom:1px solid var(--hairline);
    flex-shrink:0;
  }
  .hero-deco{ position:absolute; inset:0; pointer-events:none; }
  .deco{ position:absolute; opacity:0.28; }
  .deco-1{ width:64px; height:64px; top:18px; right:14%; color:var(--coral); transform:rotate(-8deg); }
  .deco-2{ width:52px; height:52px; top:120px; right:5%; color:var(--azure); transform:rotate(6deg); }
  .deco-3{ width:58px; height:58px; bottom:16px; right:22%; color:var(--violet); transform:rotate(-4deg); }
  .deco-4{ width:44px; height:44px; top:36px; right:32%; color:var(--magenta); transform:rotate(10deg); }
  .deco-5{ width:48px; height:48px; top:8px; right:44%; color:var(--coral); transform:rotate(14deg); }
  .deco-6{ width:40px; height:40px; bottom:30px; right:8%; color:var(--magenta); transform:rotate(-10deg); }
  .deco-7{ width:56px; height:56px; top:150px; right:38%; color:var(--azure); transform:rotate(-6deg); }
  .deco-8{ width:36px; height:36px; top:60px; right:2%; color:var(--violet); transform:rotate(8deg); }
  .deco-9{ width:50px; height:50px; top:40px; left:6%; color:var(--coral); transform:rotate(-12deg); }
  .deco-10{ width:38px; height:38px; bottom:60px; left:20%; color:var(--azure); transform:rotate(9deg); }
  .deco-11{ width:44px; height:44px; top:180px; right:10%; color:var(--magenta); transform:rotate(-7deg); }
  .deco-12{ width:34px; height:34px; bottom:20px; right:30%; color:var(--violet); transform:rotate(13deg); }
  .deco-13{ width:46px; height:46px; bottom:120px; left:42%; color:var(--coral); transform:rotate(6deg); }
  .hero-badge{
    display:inline-block; font-size:11px; letter-spacing:.18em; color:var(--coral);
    background:rgba(255,107,74,0.10); border:1px solid rgba(255,107,74,0.25);
    padding:5px 12px; border-radius:999px; margin-bottom:20px; position:relative;
  }
  .hero-title{
    font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:30px;
    letter-spacing:-0.02em; margin-bottom:8px; position:relative; max-width:640px;
  }
  .hero-tagline{
    font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:11px; letter-spacing:.12em;
    text-transform:uppercase; margin-bottom:10px; position:relative;
    background:var(--grad); -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .hero-sub{ color:var(--muted); max-width:520px; font-size:13px; position:relative; }
  .hero-desc{ color:var(--muted); max-width:560px; font-size:13px; line-height:1.55; margin-top:10px; position:relative; }

  .tools-section{ padding:40px 48px 60px; position:relative; overflow:hidden; }
  .tools-deco{ position:absolute; inset:0; pointer-events:none; }
  .tools-label{
    font-size:10.5px; letter-spacing:.16em; color:var(--muted); text-transform:uppercase; margin-bottom:16px;
  }

  .card-grid{ display:grid; grid-template-columns:repeat(3, minmax(0,1fr)); gap:18px; max-width:980px; position:relative; }
  .app-card{
    background:var(--surface); border:1px solid var(--hairline); border-radius:12px;
    padding:24px; cursor:pointer; text-align:left; color:var(--text);
    transition:border-color .15s ease, transform .15s ease; position:relative; overflow:hidden;
  }
  .app-card::before{
    content:''; position:absolute; top:0; left:0; right:0; height:3px;
    background:var(--grad); opacity:0; transition:opacity .2s ease;
  }
  .app-card:hover{ border-color:transparent; transform:translateY(-2px); box-shadow:0 10px 30px rgba(0,0,0,0.35); }
  .app-card:hover::before{ opacity:1; }
  .app-card .card-index{
    font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--brass-dim); margin-bottom:16px; display:block;
  }
  .card-icon-badge{
    width:26px; height:26px; margin-bottom:16px;
    display:flex; align-items:center; justify-content:center;
  }
  .app-card .card-icon{ width:24px; height:24px; color:var(--brass); transition:color .2s ease; }
  .app-card:hover .card-icon{ color:var(--coral); }
  .app-card h3{ font-family:'Space Grotesk',sans-serif; font-size:17px; font-weight:600; margin-bottom:8px; }
  .app-card p{ font-size:12.5px; color:var(--muted); line-height:1.55; }
  .card-arrow{ position:absolute; top:22px; right:20px; color:var(--muted); font-size:16px; transition:transform .15s ease, color .15s ease; }
  .app-card:hover .card-arrow{ transform:translate(3px,-3px); color:var(--coral); }

  .app-card.soon{ cursor:default; opacity:0.7; }
  .app-card.soon:hover{ border-color:var(--hairline); transform:none; box-shadow:none; }
  .app-card.soon:hover::before{ opacity:0; }
  .soon-badge{
    display:inline-block; font-size:10px; letter-spacing:.12em; color:var(--muted);
    background:var(--surface-2); border:1px solid var(--hairline);
    padding:3px 9px; border-radius:999px; margin-bottom:14px;
  }

  ::-webkit-scrollbar{ width:8px; height:8px; }
  ::-webkit-scrollbar-track{ background:transparent; }
  ::-webkit-scrollbar-thumb{ background:var(--hairline); border-radius:4px; }

  footer{ padding:0 48px 32px; }
  .legal-links{
    display:flex; flex-wrap:wrap; gap:18px; justify-content:flex-end;
    font-family:'IBM Plex Mono',monospace; font-size:11px; margin-bottom:10px;
  }
  .legal-links a{ color:var(--muted); text-decoration:none; }
  .legal-links a:hover{ color:var(--coral); }
  footer .credit{width:100%; text-align:right; font-family:'IBM Plex Mono',monospace; font-size:10.5px; letter-spacing:.04em; color:var(--muted); display:flex; align-items:center; justify-content:flex-end; gap:8px;}
  .signature-pill{
    display:inline-flex; align-items:center; gap:6px;
    padding:4px 12px 4px 5px; border-radius:999px;
    background:var(--surface-2); border:1px solid var(--hairline);
  }
  .credit-logo{height:18px; width:18px; border-radius:5px; object-fit:cover;}
  .credit-fallback{
    display:none; width:18px; height:18px; border-radius:5px; align-items:center; justify-content:center;
    background:var(--grad); font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:9px; color:#fff;
  }
  footer .credit b{
    font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:11.5px; font-style:normal;
    background:var(--grad); -webkit-background-clip:text; background-clip:text; color:transparent;
  }

  @media (max-width:860px){
    body{ flex-direction:column; overflow:auto; height:auto; }
    aside{ width:100%; height:auto; max-height:none; border-right:0; border-bottom:1px solid var(--hairline); }
    nav{ display:flex; overflow-x:auto; gap:8px; padding:12px; }
    .nav-item{ flex-direction:column; text-align:center; min-width:120px; gap:6px; margin-bottom:0; }
    .nav-item.active::before{ left:8px; right:8px; top:auto; bottom:-8px; width:auto; height:3px; }
    .nav-desc{ display:none; }
    main{ height:auto; }
    .frame-wrap{ height:85vh; }
    .hero{ padding:22px 20px 20px; }
    .hero-title{ font-size:22px; }
    .tools-section{ padding:28px 20px 40px; }
    .deco{ display:none; }
    .card-grid{ grid-template-columns:1fr; }
    .top-right-badge{ position:relative; top:auto; right:auto; padding:12px 20px; justify-content:flex-end; background:var(--surface); border-bottom:1px solid var(--hairline); }
    .top-right-badge .theme-toggle-standalone{ background:var(--surface-2); }
  }

  #authOverlay{
    position:fixed; inset:0; z-index:1000; display:flex;
    background:var(--bg); overflow:hidden;
  }
  #authOverlay.hidden{ display:none; }

  .auth-brand-panel{
    position:relative; flex:1.1; overflow:hidden; display:flex; flex-direction:column;
    align-items:center; justify-content:center; padding:40px;
    background:
      radial-gradient(1000px 600px at 20% 15%, rgba(255,107,74,0.16), transparent 60%),
      radial-gradient(900px 600px at 85% 85%, rgba(62,143,224,0.14), transparent 60%),
      var(--surface);
    border-right:1px solid var(--hairline);
  }
  .auth-blob{
    position:absolute; border-radius:50%; filter:blur(60px); opacity:0.35; pointer-events:none;
